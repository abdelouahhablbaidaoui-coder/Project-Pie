<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mettre en vente</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #cfd8dc;
      padding: 2rem 1rem;
      font-family: 'Space Grotesk', sans-serif;
    }

    .ocean-modal {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
      animation: riseUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── HEADER ── */
    .modal-head {
      background: linear-gradient(135deg, #0b7fc9 0%, #0a5f9e 100%);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .modal-head-title {
      font-family: 'Sora', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.01em;
    }

    .head-icon-box {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .btn-close-custom {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.85);
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .btn-close-custom:hover { background: rgba(255,255,255,0.25); color: #fff; }

    /* ── BODY ── */
    .modal-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background-color: #0d3d6b;
    }

    .field-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .ocean-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .ocean-input::placeholder { color: rgba(255,255,255,0.3); }
    .ocean-input:focus {
      border-color: rgba(100,200,255,0.5);
      background: rgba(255,255,255,0.09);
    }

    /* ── SELECT ── */
    .select-wrap { position: relative; }
    .select-wrap select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.6rem 2rem 0.6rem 0.85rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      appearance: none; -webkit-appearance: none;
      cursor: pointer;
    }
    .select-wrap select:focus {
      border-color: rgba(100,200,255,0.5);
      background: rgba(255,255,255,0.09);
    }
    .select-wrap select option { background: #0d3d6b; color: #fff; }
    .select-arrow {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: rgba(255,255,255,0.4);
    }

    /* ── ROW ── */
    .row-flex { display: flex; gap: 12px; }
    .col-7 { flex: 0 0 58%; }
    .col-5 { flex: 0 0 calc(42% - 12px); }

    /* ── PRICE ── */
    .price-wrap {
      display: flex;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      transition: border-color 0.2s;
    }
    .price-wrap:focus-within { border-color: rgba(100,200,255,0.5); }
    .price-wrap input {
      flex: 1; background: transparent; border: none;
      padding: 0.6rem 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600; color: #fff;
      outline: none; min-width: 0;
    }
    .price-wrap input::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }
    .price-badge {
      padding: 0 12px;
      background: rgba(100,200,255,0.15);
      color: #7dd4f8;
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center;
      border-left: 1px solid rgba(255,255,255,0.08);
    }

    /* ── ÉTAT ── */
    .etat-group { display: flex; gap: 8px; }
    .etat-btn {
      flex: 1; padding: 0.5rem 0;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .etat-btn:hover { border-color: rgba(100,200,255,0.3); color: rgba(255,255,255,0.75); }
    .etat-btn:hover svg { stroke: rgba(255,255,255,0.75); }
    .etat-btn.active {
      background: rgba(100,200,255,0.18);
      border-color: rgba(100,200,255,0.55);
      color: #7dd4f8;
    }
    .etat-btn.active svg { stroke: #7dd4f8; }
    .etat-btn svg { stroke: rgba(255,255,255,0.45); transition: stroke 0.2s; }

    /* ── FILE UPLOAD ── */
    .file-zone {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px dashed rgba(255,255,255,0.15);
      border-radius: 10px; padding: 1rem;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; transition: all 0.2s;
    }
    .file-zone:hover { border-color: rgba(100,200,255,0.4); background: rgba(100,200,255,0.06); }
    .upload-icon-box {
      width: 30px; height: 30px;
      background: rgba(100,200,255,0.15);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .file-text { font-size: 13px; color: rgba(255,255,255,0.45); }
    .file-text span { color: #7dd4f8; font-weight: 500; }

    /* ── WHATSAPP ── */
    .wa-wrap {
      display: flex;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; overflow: hidden;
      background: rgba(255,255,255,0.06);
      transition: border-color 0.2s;
    }
    .wa-wrap:focus-within { border-color: rgba(100,200,255,0.5); }
    .wa-prefix {
      padding: 0 12px;
      background: rgba(37,211,102,0.15);
      display: flex; align-items: center;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .wa-wrap input {
      flex: 1; background: transparent; border: none;
      padding: 0.6rem 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; color: #fff; outline: none;
    }
    .wa-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .hint-text { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 5px; }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 0.25rem 0; }

    /* ── SUBMIT BUTTON ── */
    .btn-publish {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, #0b8fd6 0%, #0869a8 100%);
      border: none; border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 600; color: #fff;
      cursor: pointer; letter-spacing: 0.01em; transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(11,143,214,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-publish:hover {
      background: linear-gradient(135deg, #13a3f0 0%, #0b7dc4 100%);
      box-shadow: 0 12px 32px rgba(11,163,240,0.4);
      transform: translateY(-1px);
    }
    .btn-publish:active { transform: translateY(0); }
  </style>
</head>
<body>

  <div class="ocean-modal" id="theModal">

    <div class="modal-head">
      <div class="modal-head-title">
        <div class="head-icon-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        <span data-i18n="modal_sell_title">Mettre en vente</span>
      </div>
      <button class="btn-close-custom" id="closeBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">

      <div>
        <label class="field-label" data-i18n="modal_sell_item_title">Titre de l'objet</label>
        <input class="ocean-input" type="text" placeholder="Ex: Livre de Math, Blouse T-M..." data-i18n-placeholder="modal_sell_placeholder_title">
      </div>

      <div class="row-flex">
        <div class="col-7">
          <label class="field-label" data-i18n="modal_sell_category">Catégorie</label>
          <div class="select-wrap">
            <select id="categorieSelect">
              <option value="" disabled selected data-i18n="modal_sell_cat_select">Sélectionner...</option>
              <option value="livres" data-i18n="modal_sell_cat_books"> Livres</option>
              <option value="tech" data-i18n="modal_sell_cat_tech"> Tech &amp; Informatique</option>
              <option value="vetements" data-i18n="modal_sell_cat_clothes"> Vêtements</option>
              <option value="outils" data-i18n="modal_sell_cat_tools"> Outils / Matériel</option>
              <option value="sport" data-i18n="modal_sell_cat_sport"> Sport &amp; Loisirs</option>
              <option value="mobilier" data-i18n="modal_sell_cat_furniture"> Mobilier</option>
              <option value="autre" data-i18n="modal_sell_cat_other"> Autre</option>
            </select>
            <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
        <div class="col-5">
          <label class="field-label" data-i18n="modal_sell_price">Prix (DH)</label>
          <div class="price-wrap">
            <input type="number" placeholder="0" min="0">
            <div class="price-badge">DH</div>
          </div>
        </div>
      </div>

      <div>
        <label class="field-label" data-i18n="modal_sell_condition">État</label>
        <div class="etat-group">
          <div class="etat-btn" data-etat="neuf">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span data-i18n="modal_sell_cond_new">Neuf</span>
          </div>
          <div class="etat-btn active" data-etat="bon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span data-i18n="modal_sell_cond_good">Bon</span>
          </div>
          <div class="etat-btn" data-etat="use">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span data-i18n="modal_sell_cond_used">Usé</span>
          </div>
        </div>
      </div>

      <div>
        <label class="field-label" data-i18n="modal_sell_photo_label">Photo du produit</label>
        <div class="file-zone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon-box">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7dd4f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
          </div>
          <div class="file-text"><span data-i18n="modal_sell_photo_choose">Choisir une photo</span> <span data-i18n="modal_sell_photo_or">ou glisser ici</span></div>
          <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <label class="field-label" data-i18n="modal_sell_wa_label">Ton WhatsApp</label>
        <div class="wa-wrap">
          <div class="wa-prefix">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#25d366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.14 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.05 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/>
            </svg>
          </div>
          <input type="tel" placeholder="06 XX XX XX XX">
        </div>
        <p class="hint-text" data-i18n="modal_sell_wa_hint">Les acheteurs te contacteront directement ici.</p>
      </div>

      <button class="btn-publish">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        <span data-i18n="modal_sell_btn_publish">Publier l'annonce</span>
      </button>

    </div>
  </div>

  <script>
    // État toggle
    document.querySelectorAll('.etat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.etat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Close button
    document.getElementById('closeBtn').addEventListener('click', () => {
      const modal = document.getElementById('theModal');
      modal.style.transition = 'opacity 0.3s, transform 0.3s';
      modal.style.opacity = '0';
      modal.style.transform = 'translateY(16px) scale(0.97)';
    });
  </script>
  <script src="i18n.js"></script>

</body>
</html>
