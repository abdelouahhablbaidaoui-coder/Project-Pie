<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À propos & Contact - Marketplace CMC</title>
    <link rel="stylesheet" href="contactUs.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <section class="contact-section">
        <div class="container">
            <div class="contact-wrapper">
                
                <div class="contact-info">
                    <h2 data-i18n="contact_coords_title">Nos Coordonnées</h2>
                    <p data-i18n="contact_coords_desc">Une question, une suggestion ou un problème avec une commande ? N'hésitez pas à nous contacter.</p>
                    
                    <div class="info-boxes">
                        <div class="info-box">
                            <i class="fas fa-map-marker-alt"></i>
                            <h4 data-i18n="contact_campus_title">Notre Campus</h4>
                            <p data-i18n="contact_campus_desc">CMC Tanger, Maroc</p>
                        </div>
                        <div class="info-box">
                            <i class="fas fa-envelope"></i>
                            <h4 data-i18n="contact_email_title">Email</h4>
                            <p>contact@cmc-marketplace.ma</p>
                        </div>
                        <div class="info-box">
                            <i class="fab fa-whatsapp"></i>
                            <h4 data-i18n="contact_whatsapp_title">WhatsApp (Support)</h4>
                            <p>+212 6 28 07 25 66</p>
                        </div>
                    </div>
                </div>

                <div class="contact-form-container">
                    <h2 data-i18n="contact_form_title">Envoyez-nous un message</h2>
                    <form id="contactForm">
                        <div class="input-group">
                            <input type="text" placeholder="Votre Nom complet" data-i18n-placeholder="contact_placeholder_name" required>
                        </div>
                        <div class="input-group">
                            <input type="email" placeholder="Email institutionnel" data-i18n-placeholder="contact_placeholder_email" required>
                        </div>
                        <div class="input-group">
                            <input type="text" placeholder="Sujet" data-i18n-placeholder="contact_placeholder_subject" required>
                        </div>
                        <div class="input-group">
                            <textarea placeholder="Votre message ici..." data-i18n-placeholder="contact_placeholder_message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn" data-i18n="contact_btn_send">Envoyer le message</button>
                    </form>
                </div>

            </div>
        </div>
    </section>

<script src="i18n.js"></script>
</body>
</html>
